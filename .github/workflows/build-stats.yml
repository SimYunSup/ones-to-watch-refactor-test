name: Build stats & visual diff
on:
  workflow_dispatch:
  push:
    branches: [main]
    # The stats commit only touches README.md — ignoring it here prevents a
    # self-triggering loop (belt and suspenders next to [skip ci]).
    paths-ignore:
      - 'README.md'
permissions:
  contents: write
concurrency:
  group: build-stats
  cancel-in-progress: true
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Measure build times and sizes (updates README)
        run: pnpm run build:stats
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Visual diff across variants
        run: pnpm run visual:diff
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff
          path: visual-diff/
          if-no-files-found: ignore
      - name: Commit README stats update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || { git commit -m "docs: update build stats [skip ci]"; git push; }
