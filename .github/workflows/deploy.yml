name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build all apps
        run: pnpm run build:all
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      - name: Assemble Pages artifact
        run: |
          mkdir -p site
          cp -R apps/web/dist/. site/
          mkdir -p site/react-router site/tanstack site/kudzu
          # react-router emits HTML under its basename inside build/client;
          # merge assets (root) + pages (base-prefixed dir) into site/react-router.
          cp -R apps/react-router/build/client/. site/react-router/
          cp -R apps/react-router/build/client/ones-to-watch-refactor-test/react-router/. site/react-router/
          rm -rf site/react-router/ones-to-watch-refactor-test
          cp -R apps/tanstack-router/dist/client/. site/tanstack/
          cp -R apps/kudzu/dist/. site/kudzu/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
