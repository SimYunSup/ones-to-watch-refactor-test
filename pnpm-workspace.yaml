packages:
  - 'apps/*'
  - 'packages/*'
# pnpm 11 reads allowBuilds here; pnpm 10 (CI) reads pnpm.onlyBuiltDependencies
# in the root package.json. Keep both in sync.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - '@kudzujs/core@0.5.2'
  - '@react-router/dev@8.3.0'
  - '@react-router/node@8.3.0'
  - react-router@8.3.0
